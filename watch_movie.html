<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ყურება - დოკუმენტური ფილმები</title>
    <meta name="description" content="უყურეთ ფილმებს ქართული გახმოვანებით ონლაინ საიტზე 'დოკუმენტური ფილმები'.">
    <meta property="og:title" content="დოკუმენტური ფილმები - უყურეთ ონლაინ">
    <meta property="og:description" content="უყურეთ საინტერესო დოკუმენტურ ფილმებსა და ვიდეოებს ქართული გახმოვანებით.">
    <meta property="og:image" content="images/logo/Logo.png">
    <meta property="og:url" content="https://documentary-movies.vercel.app">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo"><img src="images/logo/Logo.png" alt="Cineby Logo" class="logo-img"></a>
        <nav>
            <a href="index.html">ფილმები</a>
            <a href="index.html?type=videos">ვიდეოები</a>
            <a href="https://www.buymeacoffee.com/placeholder" target="_blank" class="btn-support">მხარდაჭერა</a>
        </nav>
    </header>

    <div class="watch-container">

        <div class="player-container">
            <div id="rumble-player"></div>
        </div>

        <div class="title-section">
            <h1 class="movie-title" id="page-movie-title" style="margin-bottom: 0; font-size: 28px;">მოტვირთვა...</h1>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        async function loadMovie() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');

            if (!movieId) {
                alert('ფილმი ვერ მოიძებნა!');
                window.location.href = 'index.html';
                return;
            }

            const { data: movie, error } = await _supabase
                .from('movies')
                .select('*')
                .eq('id', movieId)
                .single();

            if (error || !movie) {
                console.error('Error fetching movie:', error);
                document.getElementById('page-movie-title').innerText = 'ფილმი ვერ მოიძებნა';
                document.title = 'ფილმი ვერ მოიძებნა - დოკუმენტური ფილმები';
                return;
            }

            // Update UI
            const movieTitle = movie.title;
            const movieYear = movie.release_year ? `(${movie.release_year})` : '';
            document.getElementById('page-movie-title').innerText = movieTitle;

            // SEO: Dynamic Title
            document.title = `${movieTitle} ქართულად ${movieYear} - დოკუმენტური ფილმები`;

            // Increment Views
            incrementViews('movies', movieId);

            // Display Views
            const viewsDiv = document.createElement('div');
            viewsDiv.className = 'card-meta';
            viewsDiv.style.fontSize = '14px';
            viewsDiv.style.marginTop = '8px';

            // Format number to K/M
            const currentViews = (movie.views || 0) + 1;
            const viewsDisplay = formatViews(currentViews);
            const dateDisplay = formatRelativeDate(movie.created_at);

            viewsDiv.innerHTML = `<span>${viewsDisplay}</span><span class="dot">•</span><span>${dateDisplay}</span>`;
            document.querySelector('.title-section').appendChild(viewsDiv);

            // SEO: Dynamic Meta Description
            const descriptionText = `უყურეთ ფილმს ${movieTitle} ქართული გახმოვანებით ონლაინ საიტზე 'დოკუმენტური ფილმები'. ექსკლუზიური თარგმანი.`;

            let metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute('content', descriptionText);
            }

            // SEO: Open Graph Updates
            let ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', `${movieTitle} ქართულად - დოკუმენტური ფილმები`);

            let ogDesc = document.querySelector('meta[property="og:description"]');
            if (ogDesc) ogDesc.setAttribute('content', descriptionText);

            if (movie.cover_url) {
                let ogImage = document.querySelector('meta[property="og:image"]');
                if (ogImage) ogImage.setAttribute('content', movie.cover_url);
            }

            // Rumble ID/URL Parser (Supports raw ID, full URL, or entire IFRAME tag)
            function prepareRumbleUrl(input) {
                if (!input) return '';
                input = input.trim();

                // Check if it's an iframe tag (extract src)
                if (input.includes('<iframe')) {
                    const srcMatch = input.match(/src=["'](.*?)["']/i);
                    if (srcMatch && srcMatch[1]) {
                        input = srcMatch[1];
                    }
                }

                // 1. If it's already an embed URL, use it as is
                if (input.includes('rumble.com/embed/')) {
                    if (!input.startsWith('http')) {
                        input = 'https://' + input.replace(/^[\/:]+/, '');
                    }
                    return input;
                }

                // 2. Extract ID from various formats
                const idRegex = /(?:rumble\.com\/v|(?:\/|^)v)([a-zA-Z0-9]+)/i;
                const match = input.match(idRegex);
                let rId = (match && match[1]) ? match[1] : null;

                if (!rId) {
                    if (!input.includes('://') && !input.includes('.')) {
                        rId = input.split('/').filter(Boolean).pop();
                    } else {
                        const fallbackMatch = input.match(/\/v([a-zA-Z0-9]+)/i);
                        if (fallbackMatch) rId = fallbackMatch[1];
                    }
                }

                if (rId) {
                    return `https://rumble.com/embed/${rId}/?pub=4p1avk&api=1`;
                }
                return input;
            }

            const embedUrl = prepareRumbleUrl(movie.video_id || '');

            if (embedUrl) {
                const playerContainer = document.getElementById('rumble-player');
                const iframe = document.createElement('iframe');
                iframe.className = 'rumble';
                iframe.src = embedUrl;
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('allowfullscreen', '');
                playerContainer.appendChild(iframe);
            }
        }

        async function incrementViews(table, movieId) {
            try {
                const { error } = await _supabase.rpc('increment_movie_views', { movie_id: movieId });
                if (error) console.error('Error incrementing views:', error);
            } catch (err) {
                console.error('RPC failed, views may not increment', err);
            }
        }

        function formatViews(count) {
            if (!count) return '0 ნახვა';
            if (count >= 1000000) return (count / 1000000).toFixed(1) + 'M ნახვა';
            if (count >= 1000) return (count / 1000).toFixed(1) + 'K ნახვა';
            return `${count} ნახვა`;
        }

        function formatRelativeDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            
            if (diffInSeconds < 60) return 'ახლახანს';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)} წუთის წინ`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)} საათის წინ`;
            if (diffInSeconds < 604800) return `${Math.floor(diffInSeconds / 86400)} დღის წინ`;
            
            return date.toLocaleDateString('ka-GE', { month: 'short', day: 'numeric' });
        }

        window.onload = loadMovie;
    </script>

</body>

</html>
