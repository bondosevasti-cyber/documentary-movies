<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ყურება - Cineby</title>
    <meta name="description" content="უყურეთ მოკლე ვიდეოებს ქართული გახმოვანებით ონლაინ Cineby-ზე.">
    <meta property="og:title" content="Cineby - Watch Short Videos Online">
    <meta property="og:description" content="Watch your favorite short videos and documentaries.">
    <meta property="og:image" content="images/logo/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo"><img src="images/logo/Logo.png" alt="Cineby Logo" class="logo-img"></a>
        <nav>
            <a href="index.html">ფილმები</a>
            <a href="index.html?type=videos">ვიდეოები</a>
            <a href="https://www.buymeacoffee.com/placeholder" target="_blank" class="btn-support">მხარდაჭერა</a>
        </nav>
    </header>

    <div class="watch-container">

        <div class="player-container">
            <div id="rumble-player"></div>
        </div>

        <div class="title-section">
            <h1 class="movie-title" id="page-movie-title" style="margin-bottom: 0; font-size: 28px;">მოტვირთვა...</h1>
            <a id="original-link-btn" href="#" target="_blank" class="video-original-link" style="margin-top: 20px; display: none;">ნახე ორიგინალი</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');

            if (!videoId) {
                alert('ვიდეო ვერ მოიძებნა!');
                window.location.href = 'index.html';
                return;
            }

            const { data: video, error } = await _supabase
                .from('short_videos')
                .select('*')
                .eq('id', videoId)
                .single();

            if (error || !video) {
                console.error('Error fetching video:', error);
                document.getElementById('page-movie-title').innerText = 'ვიდეო ვერ მოიძებნა';
                return;
            }

            // Update UI
            document.getElementById('page-movie-title').innerText = video.title;
            document.title = `${video.title} - Cineby Shorts`;

            // Increment Views
            incrementShortViews(videoId);

            // Display Views
            const viewsDiv = document.createElement('div');
            viewsDiv.className = 'card-meta';
            viewsDiv.style.fontSize = '14px';
            viewsDiv.style.marginTop = '8px';
            
            const viewsDisplay = video.views ? formatViews(video.views) : '0 ნახვა';
            const dateDisplay = formatRelativeDate(video.created_at);
            
            viewsDiv.innerHTML = `<span>${viewsDisplay}</span><span class="dot">•</span><span>${dateDisplay}</span>`;
            document.querySelector('.title-section').appendChild(viewsDiv);

            if (video.original_link) {
                const btn = document.getElementById('original-link-btn');
                btn.href = video.original_link;
                btn.style.display = 'inline-block';
            }

            // Rumble Embed Logic
            function prepareRumbleUrl(input) {
                if (!input) return '';
                input = input.trim();
                
                // 1. If it's already an embed URL, use it as is
                if (input.includes('rumble.com/embed/')) {
                    if (!input.startsWith('http')) {
                        input = 'https://' + input.replace(/^[\/:]+/, '');
                    }
                    return input;
                }
                
                // 2. Extract ID from various formats
                const idRegex = /(?:rumble\.com\/v|(?:\/|^)v)([a-zA-Z0-9]+)/i;
                const match = input.match(idRegex);
                let rId = (match && match[1]) ? match[1] : null;
                
                if (!rId) {
                    if (!input.includes('://') && !input.includes('.')) {
                        rId = input.split('/').filter(Boolean).pop();
                    } else {
                        const fallbackMatch = input.match(/\/v([a-zA-Z0-9]+)/i);
                        if (fallbackMatch) rId = fallbackMatch[1];
                    }
                }
                
                if (rId) {
                    return `https://rumble.com/embed/${rId}/?pub=4p1avk&api=1`;
                }
                return input;
            }

            const embedUrl = prepareRumbleUrl(video.rumble_link || '');

            if (embedUrl) {
                const playerContainer = document.getElementById('rumble-player');
                const iframe = document.createElement('iframe');
                iframe.className = 'rumble';
                iframe.src = embedUrl;
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('allowfullscreen', '');
                playerContainer.appendChild(iframe);
            }
        }

        async function incrementShortViews(videoId) {
            const { error } = await _supabase.rpc('increment_short_views', { video_id: videoId });
            if (error) console.error('Error incrementing views:', error);
        }

        function formatViews(count) {
            return `${count} ნახვა`;
        }

        function formatRelativeDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            
            if (diffInSeconds < 60) return 'ახლახანს';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)} წუთის წინ`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)} საათის წინ`;
            if (diffInSeconds < 604800) return `${Math.floor(diffInSeconds / 86400)} დღის წინ`;
            
            return date.toLocaleDateString('ka-GE', { month: 'short', day: 'numeric' });
        }

        window.onload = loadVideo;
    </script>

</body></html>
