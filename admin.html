<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Cineby</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 150px auto 100px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }
        .admin-form-container {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(227, 27, 35, 0.1);
            position: sticky;
            top: 100px;
            height: fit-content;
        }
        .admin-form-container h1 { color: var(--text-color); margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; background: #222; border: 1px solid #333; border-radius: 5px; color: white; font-size: 14px;
        }
        
        .upload-wrapper {
            position: relative; width: 100%; background: #222; border: 2px dashed #444; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: border-color 0.3s; margin-bottom: 5px;
        }
        .poster-wrapper { aspect-ratio: 1; }
        .cover-wrapper { aspect-ratio: 16 / 9; }
        .upload-wrapper.drag-active { border-color: var(--accent-color); background: rgba(227, 27, 35, 0.05); }
        .upload-placeholder { text-align: center; color: #888; cursor: pointer; padding: 20px; }
        .upload-placeholder svg { width: 40px; height: 40px; margin-bottom: 10px; fill: #444; }
        .cropper-container-div { width: 100%; height: 100%; display: none; }
        .cropper-container-div img { max-width: 100%; display: block; }
        .reset-upload { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; display: none; cursor: pointer; z-index: 10; font-size: 18px; }

        .checkbox-group { display: flex; gap: 20px; margin: 20px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: var(--accent-color); }
        .btn-submit { width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #444; cursor: not-allowed; }
        .btn-logout { background: transparent; border: 1px solid #333; color: #666; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 10px; }

        .movie-list-container { background: #080808; padding: 20px; border-radius: 10px; }
        .movie-table { width: 100%; border-collapse: collapse; }
        .movie-table th, .movie-table td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .actions { display: flex; gap: 10px; }
        .btn-edit { background: #2196F3; border: none; padding: 5px 10px; border-radius: 4px; color: white; cursor: pointer; }
        .btn-delete { background: #f44336; border: none; padding: 5px 10px; border-radius: 4px; color: white; cursor: pointer; }

        #login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: black; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #admin-content { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="admin-form-container" style="width: 400px; position: static;">
            <h1>ადმინ შესვლა</h1>
            <div class="form-group">
                <label>ელ-ფოსტა</label>
                <input type="email" id="login-email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label>პაროლი</label>
                <input type="password" id="login-pass" placeholder="Password" required>
            </div>
            <button class="btn-submit" id="btn-login" onclick="handleLogin()">შესვლა</button>
            <p id="login-error" style="color:red; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <header>
        <a href="index.html" class="logo"><img src="images/logo/Logo.png" alt="Cineby Logo" class="logo-img"></a>
        <button class="btn-logout" id="logout-btn" style="float: right; margin: 20px;" onclick="handleLogout()">გამოსვლა</button>
    </header>

    <div class="admin-container" id="admin-content">
        <div class="admin-form-container">
            <h1 id="form-title">ფილმის დამატება</h1>
            <form id="movie-form">
                <input type="hidden" name="movie_id" id="movie-id">
                <div class="form-group">
                    <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                        <span>პოსტერი (1:1)</span>
                        <input type="radio" name="ratio_choice" value="1:1" checked style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent-color);">
                    </label>
                    <div class="upload-wrapper poster-wrapper" id="poster-drop-zone">
                        <button type="button" class="reset-upload" id="poster-reset">&times;</button>
                        <div class="upload-placeholder" id="poster-placeholder" onclick="document.getElementById('poster-input').click()">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                            <p>პოსტერის ატვირთვა</p>
                        </div>
                        <div class="cropper-container-div" id="poster-cropper-container"><img id="poster-cropper-image"></div>
                        <input type="file" id="poster-input" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                        <span>ფონი (16:9)</span>
                        <input type="radio" name="ratio_choice" value="16:9" style="width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent-color);">
                    </label>
                    <div class="upload-wrapper cover-wrapper" id="cover-drop-zone">
                        <button type="button" class="reset-upload" id="cover-reset">&times;</button>
                        <div class="upload-placeholder" id="cover-placeholder" onclick="document.getElementById('cover-input').click()">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                            <p>ფონის ატვირთვა</p>
                        </div>
                        <div class="cropper-container-div" id="cover-cropper-container"><img id="cover-cropper-image"></div>
                        <input type="file" id="cover-input" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="form-group"><label>დასახელება</label><input type="text" name="title"></div>
                <div class="form-group"><label>ჟანრი</label><input type="text" name="genre"></div>
                <div class="form-group"><label>აღწერა</label><textarea name="description" rows="2"></textarea></div>
                <div class="form-row" style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;"><label>წელი</label><input type="text" name="release_year"></div>
                    <div class="form-group" style="flex: 1;"><label>რეიტინგი</label><input type="text" name="rating"></div>
                </div>
                <div class="form-group"><label>Rumble Video ID</label><input type="text" name="video_id"></div>
                <div class="form-group">
                    <label>ხანგრძლივობა</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div style="flex: 1;"><input type="number" name="dur_h" min="0" placeholder="სთ"></div>
                        <div style="color: #666;">სთ</div>
                        <div style="flex: 1;"><input type="number" name="dur_m" min="0" max="59" placeholder="წთ"></div>
                        <div style="color: #666;">წთ</div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="is_top_10"> Top 5</label>
                    <label class="checkbox-item"><input type="checkbox" name="is_coming_soon"> მალე</label>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn" disabled>მონაცემების ჩატვირთვა...</button>
                <button type="button" class="btn-cancel" id="cancel-btn" onclick="resetForm()">გაუქმება</button>
            </form>
        </div>

        <div class="admin-lists-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
            <div class="movie-list-container">
                <h2>ფილმების სია</h2>
                <table class="movie-table">
                    <thead><tr><th>პოსტერი</th><th>დასახელება</th><th>სექცია</th><th>მოქმედება</th></tr></thead>
                    <tbody id="movies-tbody"></tbody>
                </table>
            </div>

                                        <!-- Top 5 Manager Section -->
            <div class="movie-list-container">
                <h2>Top 5 მენეჯერი (რეიტინგი 1-5)</h2>
                <div id="top5-manager-list" style="padding-top:10px;">
                    <!-- 1-5 Slots Rendered Here -->
                </div>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let posterCropper = null, coverCropper = null, isEditing = false, existingPosterUrl = '', existingCoverUrl = '';

        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                showAdminPanel();
            }
        };

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');
            const errorEl = document.getElementById('login-error');

            btn.disabled = true;
            btn.innerText = 'ავტორიზაცია...';
            errorEl.style.display = 'none';

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

            if (error) {
                errorEl.innerText = 'ავტორიზაციის შეცდომა: ' + error.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'შესვლა';
            } else {
                showAdminPanel();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        function showAdminPanel() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-content').style.display = 'grid';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = 'ფილმის შენახვა';
            loadMovies();
            loadTop5Manager();
        }

        let allMovies = [];
        async function loadTop5Manager() {
            const { data: movies } = await _supabase.from('movies').select('*');
            allMovies = movies || [];
            
            const container = document.getElementById('top5-manager-list');
            container.innerHTML = '';

            for (let i = 1; i <= 5; i++) {
                const currentMovie = allMovies.find(m => m.top_10_position == i);
                const div = document.createElement('div');
                div.style = 'margin-bottom:12px; display:flex; align-items:center; gap:10px; background:#111; padding:10px; border-radius:5px; border-left: 3px solid #e31b23;';
                
                div.innerHTML = `
                    <div style="font-weight:bold; color:red; min-width:25px;">#${i}</div>
                    <select onchange="updateRank(${i}, this.value)" style="flex:1; background:#222; color:white; border:1px solid #333; padding:5px; border-radius:4px;">
                        <option value="">ცარიელია</option>
                        ${allMovies.map(m => `<option value="${m.id}" ${currentMovie && currentMovie.id === m.id ? 'selected' : ''}>${m.title}</option>`).join('')}
                    </select>
                `;
                container.appendChild(div);
            }
        }

        async function updateRank(pos, movieId) {
            // 1. Clear any movie currently in this position
            await _supabase.from('movies').update({ top_10_position: null }).eq('top_10_position', pos);
            
            // 2. Set new movie if ID provided
            if (movieId) {
                await _supabase.from('movies').update({ top_10_position: null }).eq('id', movieId);
                await _supabase.from('movies').update({ top_10_position: pos }).eq('id', movieId);
            }
            
            loadTop5Manager();
            loadMovies();
        }

        // --- Generic Cropper Logic ---
        function setupCropZone(type, aspectRatio) {
            const dropZone = document.getElementById(`${type}-drop-zone`), fileInput = document.getElementById(`${type}-input`), cropperImg = document.getElementById(`${type}-cropper-image`), cropperContainer = document.getElementById(`${type}-cropper-container`), placeholder = document.getElementById(`${type}-placeholder`), btnReset = document.getElementById(`${type}-reset`);
            ['dragenter', 'dragover'].forEach(n => dropZone.addEventListener(n, (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); }));
            ['dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, (e) => { e.preventDefault(); dropZone.classList.remove('drag-active'); }));
            dropZone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) initCropper(file, type, aspectRatio);
            });
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) initCropper(file, type, aspectRatio);
            });
            btnReset.onclick = () => {
                const cropperVar = (type === 'poster') ? posterCropper : coverCropper;
                if (cropperVar) cropperVar.destroy();
                if (type === 'poster') posterCropper = null; else coverCropper = null;
                cropperImg.src = ''; cropperContainer.style.display = 'none'; placeholder.style.display = 'flex'; btnReset.style.display = 'none'; fileInput.value = '';
                if (type === 'poster') existingPosterUrl = ''; else existingCoverUrl = '';
            };
        }

        function initCropper(file, type, aspectRatio) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const cropperImg = document.getElementById(`${type}-cropper-image`), cropperContainer = document.getElementById(`${type}-cropper-container`), placeholder = document.getElementById(`${type}-placeholder`), btnReset = document.getElementById(`${type}-reset`);
                cropperImg.src = e.target.result; placeholder.style.display = 'none'; cropperContainer.style.display = 'block'; btnReset.style.display = 'block';
                let cropperVar = (type === 'poster') ? posterCropper : coverCropper;
                if (cropperVar) cropperVar.destroy();
                const newCropper = new Cropper(cropperImg, { aspectRatio, viewMode: 1, dragMode: 'move', guides: false, center: false, highlight: false, cropBoxMovable: false, cropBoxResizable: false, background: false });
                if (type === 'poster') posterCropper = newCropper; else coverCropper = newCropper;
            };
            reader.readAsDataURL(file);
        }

        setupCropZone('poster', 1); setupCropZone('cover', 16 / 9);

        async function loadMovies() {
            const { data: movies, error } = await _supabase.from('movies').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            const tbody = document.getElementById('movies-tbody'); tbody.innerHTML = '';
            movies.forEach(movie => {
                const badge = movie.is_top_10 ? '<span style="color:red">Top 10</span>' : (movie.is_coming_soon ? '<span style="color:green">Soon</span>' : 'Main');
                tbody.innerHTML += `<tr><td><img src="${movie.poster_url}" style="width:40px;height:40px;border-radius:4px;object-fit:cover;"></td><td><b>${movie.title}</b><br><small>${movie.genre}</small></td><td>${badge}</td><td class="actions"><button class="btn-edit" onclick="editMovie('${movie.id}')">E</button><button class="btn-delete" onclick="deleteMovie('${movie.id}')">D</button></td></tr>`;
            });
        }

        async function editMovie(id) {
            const { data: movie } = await _supabase.from('movies').select('*').eq('id', id).single();
            const form = document.getElementById('movie-form');
            form['movie_id'].value = movie.id; 
            form['title'].value = movie.title || ''; 
            form['genre'].value = movie.genre || ''; 
            form['description'].value = movie.description || ''; 
            form['release_year'].value = movie.release_year || ''; 
            form['rating'].value = movie.rating || ''; 
            form['video_id'].value = movie.video_id || ''; 
            
            // Parse duration "1h 30m" into hours and minutes
            if (movie.duration) {
                const match = movie.duration.match(/(\d+)h\s*(\d+)m/);
                if (match) {
                    form['dur_h'].value = match[1];
                    form['dur_m'].value = match[2];
                }
            } else {
                form['dur_h'].value = '';
                form['dur_m'].value = '';
            }

            form['is_top_10'].checked = movie.is_top_10; 
            form['is_coming_soon'].checked = movie.is_coming_soon;
            const ratioVal = movie.display_ratio || '1:1';
            document.querySelector(`input[name="ratio_choice"][value="${ratioVal}"]`).checked = true;
            existingPosterUrl = movie.poster_url; existingCoverUrl = movie.cover_url;
            document.getElementById('poster-placeholder').innerHTML = `<img src="${movie.poster_url}" style="width:100%;height:100%;object-fit:cover;"><p style="font-size:10px">შეცვლა</p>`;
            document.getElementById('cover-placeholder').innerHTML = `<img src="${movie.cover_url}" style="width:100%;height:100%;object-fit:cover;"><p style="font-size:10px">შეცვლა</p>`;
            isEditing = true; document.getElementById('form-title').innerText = 'განახლება'; document.getElementById('submit-btn').innerText = 'შენახვა'; document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMovie(id) {
            if (confirm('წაიშალოს?')) { await _supabase.from('movies').delete().eq('id', id); loadMovies(); }
        }

        function resetForm() {
            document.getElementById('movie-form').reset(); document.getElementById('poster-reset').click(); document.getElementById('cover-reset').click();
            document.getElementById('poster-placeholder').innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><p>პოსტერის ატვირთვა</p>`;
            document.getElementById('cover-placeholder').innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><p>ფონის ატვირთვა</p>`;
            isEditing = false; document.getElementById('form-title').innerText = 'ფილმის დამატება'; document.getElementById('submit-btn').innerText = 'ფილმის შენახვა'; document.getElementById('cancel-btn').style.display = 'none';
        }

        document.getElementById('movie-form').onsubmit = async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('submit-btn'); btn.disabled = true; btn.innerText = 'იტვირთება...';
            try {
                let poster_url = existingPosterUrl, cover_url = existingCoverUrl;
                if (posterCropper) {
                    const canvas = posterCropper.getCroppedCanvas({ width: 600, height: 600 });
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/webp', 0.8));
                    const fileName = `poster_${Date.now()}.webp`;
                    const { data, error } = await _supabase.storage.from('movie-images').upload(fileName, blob);
                    if (error) throw error;
                    poster_url = _supabase.storage.from('movie-images').getPublicUrl(fileName).data.publicUrl;
                }
                if (coverCropper) {
                    const canvas = coverCropper.getCroppedCanvas({ width: 1920, height: 1080 });
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/webp', 0.8));
                    const fileName = `cover_${Date.now()}.webp`;
                    const { data, error } = await _supabase.storage.from('movie-images').upload(fileName, blob);
                    if (error) throw error;
                    cover_url = _supabase.storage.from('movie-images').getPublicUrl(fileName).data.publicUrl;
                }
                const getVal = (name) => {
                    const el = form[name];
                    if (!el) return null;
                    const val = el.value.trim();
                    return val === "" ? null : val;
                };

                // Smart 'Coming Soon' Logic
                const videoId = getVal('video_id');
                const manualSoon = form['is_coming_soon'].checked;
                let finalIsSoon = manualSoon;
                if (!videoId) {
                    finalIsSoon = true; // Auto-set if no video ID
                } else if (!manualSoon) {
                    finalIsSoon = false; // Auto-unset if video ID present and not manually checked
                }

                // Format Duration: 1h 30m
                let durationStr = null;
                const h = form['dur_h'].value;
                const m = form['dur_m'].value;
                if (h || m) {
                    durationStr = `${h || 0}h ${m || 0}m`;
                }

                const displayRatio = document.querySelector('input[name="ratio_choice"]:checked').value;

                const movieData = {
                    title: getVal('title'),
                    genre: getVal('genre'),
                    description: getVal('description'),
                    release_year: getVal('release_year') ? parseInt(form['release_year'].value) : null,
                    rating: form['rating'].value.trim() ? parseFloat(form['rating'].value) : null,
                    video_id: videoId,
                    poster_url: poster_url || null,
                    cover_url: cover_url || null,
                    duration: durationStr,
                    display_ratio: displayRatio,
                    is_top_10: Boolean(form['is_top_10'].checked),
                    is_coming_soon: finalIsSoon
                };
                let result;
                if (isEditing) {
                    result = await _supabase.from('movies').update(movieData).eq('id', form['movie_id'].value);
                } else {
                    result = await _supabase.from('movies').insert([movieData]);
                }

                if (result.error) throw result.error;

                alert('წარმატებით შეინახა!');
                resetForm();
                loadMovies();
                loadTop5Manager();
            } catch (err) {
                alert('შეცდომა: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'ფილმის შენახვა';
            }
        };
    </script>
</body>
</html>
